set_tip:
  name: Tipp abgeben
  description: Speichert einen Tipp für ein Spiel.
  fields:
    entry_id:
      name: Konfigurations-ID
      description: Optional, falls mehrere Tippspiele existieren.
    player_id:
      name: Spieler-ID
      description: ID des Tippers (siehe Sensor-Attribute).
    match_id:
      name: Spiel-ID
      description: ID des WM-Spiels (z. B. A1).
    home:
      name: Tore Heim
    away:
      name: Tore Auswärts

clear_tip:
  name: Tipp löschen
  description: Entfernt einen gespeicherten Tipp für ein Spiel.
  fields:
    entry_id:
      name: Konfigurations-ID
    player_id:
      name: Spieler-ID
    match_id:
      name: Spiel-ID

set_result:
  name: Ergebnis eintragen
  description: Trägt das offizielle Spielergebnis ein und berechnet Punkte neu.
  fields:
    entry_id:
      name: Konfigurations-ID
    match_id:
      name: Spiel-ID
    home:
      name: Tore Heim
    away:
      name: Tore Auswärts

clear_result:
  name: Ergebnis löschen
  description: Entfernt ein eingetragenes Spielergebnis – Punkte für dieses Spiel werden zurückgesetzt.
  fields:
    entry_id:
      name: Konfigurations-ID
    match_id:
      name: Spiel-ID

clear_all_results:
  name: Alle Ergebnisse löschen
  description: Entfernt alle eingetragenen Spielergebnisse und setzt alle Punkte zurück.
  fields:
    entry_id:
      name: Konfigurations-ID

add_player:
  name: Spieler hinzufügen
  fields:
    entry_id:
      name: Konfigurations-ID
    name:
      name: Name

remove_player:
  name: Spieler entfernen
  fields:
    entry_id:
      name: Konfigurations-ID
    player_id:
      name: Spieler-ID

update_player_profile:
  name: Spielerprofil bearbeiten
  description: Ändert Anzeigename und Avatar eines Spielers.
  fields:
    entry_id:
      name: Konfigurations-ID
    player_id:
      name: Spieler-ID
    name:
      name: Anzeigename
      description: Neuer Name des Spielers.
    avatar:
      name: Avatar
      description: Bild als Data-URL (data:image/...;base64,...).
    remove_avatar:
      name: Avatar entfernen
      description: Gespeicherten Avatar löschen.

sync_results:
  name: Ergebnisse synchronisieren
  description: Ruft sofort Gruppenspiel-Ergebnisse von openfootball ab.
  fields:
    entry_id:
      name: Konfigurations-ID
